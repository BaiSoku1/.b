<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>LOLLL</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 35%, rgba(0, 0, 0, 0.7), rgba(3, 7, 26, 0.96)),
                url("https://raw.githubusercontent.com/ScriptObfuscator2/Website/refs/heads/main/Dark%20Theme%20With%20Light%20Bulb.jpeg");
    background-size: cover;
    background-position: center 15%;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Courier New', monospace;
    color: #edf2ff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 1.8rem;
    backdrop-filter: blur(1.5px);
  }

  .container {
    width: min(94%, 480px);
    background: rgba(10, 16, 32, 0.7);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(71, 85, 105, 0.5);
    border-radius: 2rem;
    padding: 2rem 1.8rem;
    box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.08) inset;
    text-align: center;
    transition: transform 0.2s ease;
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 600;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #facc15, #ef4444);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #a0afc7;
    background: rgba(0, 0, 0, 0.3);
    display: inline-block;
    padding: 0.2rem 1rem;
    border-radius: 30px;
    margin-bottom: 1.8rem;
    letter-spacing: 0.2px;
  }

  .input-group {
    margin: 1.2rem 0 0.8rem;
  }

  input {
    width: 100%;
    padding: 0.9rem 1.2rem;
    background: rgba(2, 6, 23, 0.85);
    border: 1.5px solid #2d3a5e;
    border-radius: 2rem;
    color: #f0f4ff;
    font-size: 0.95rem;
    font-family: 'Inter', monospace;
    outline: none;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  input:focus {
    border-color: #ef4444;
    box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.25);
    background: #030712e6;
  }

  button {
    margin-top: 1.2rem;
    width: 100%;
    padding: 0.85rem 0;
    background: linear-gradient(95deg, #ef4444, #dc2626);
    border: none;
    border-radius: 2.5rem;
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 6px 14px rgba(220, 38, 38, 0.3);
    letter-spacing: 0.3px;
  }

  button:hover {
    background: linear-gradient(95deg, #dc2626, #b91c1c);
    transform: scale(0.98);
    box-shadow: 0 3px 8px rgba(220, 38, 38, 0.4);
  }

  .footer {
    margin-top: 1.6rem;
    font-size: 0.7rem;
    color: #7c8aa8;
    border-top: 1px dashed #2d3a5e;
    padding-top: 1rem;
    letter-spacing: 0.3px;
  }

  .below-text {
    margin-top: 1.4rem;
    font-size: 0.8rem;
    color: #b9c3dd;
    text-align: center;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(4px);
    padding: 0.5rem 1.2rem;
    border-radius: 40px;
  }

  .below-text a {
    color: #facc15;
    text-decoration: none;
    font-weight: 500;
    border-bottom: 1px dotted #facc15;
    transition: 0.2s;
  }

  .below-text a:hover {
    color: #ffdf7e;
    border-bottom-color: #ffdf7e;
  }

  .date {
    position: fixed;
    bottom: 12px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 0.7rem;
    color: #7e8aa8;
    pointer-events: none;
    font-family: monospace;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(4px);
    padding: 5px 0;
    letter-spacing: 0.5px;
  }

  @media (max-width: 500px) {
    .container {
      padding: 1.6rem 1.4rem;
    }
    h1 {
      font-size: 1.6rem;
    }
    button {
      padding: 0.75rem 0;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>⟡ ACCESS KEY ⟡</h1>
  <div class="subtitle">verify identity · unlock script</div>
  <div class="input-group">
    <input type="text" id="keyInput" placeholder="✧ enter your access key ✧" autocomplete="off">
  </div>
  <button onclick="checkKey()">↯ UNLOCK ↯</button>
  <div class="footer">
    encrypt x · secure access system
  </div>
</div>

<div class="below-text">
  ⚡ do you want to obfuscate your script?
  <a href="https://encrypt-x.pages.dev/" target="_blank">encrypt now →</a>
</div>

<div class="date" id="dynamicDate">
  Published: NONE
</div>

<script>
async function GetScriptData(id) {
  let rocoins = await fetch(`https://api.codetabs.com/v1/proxy/?quest=https://github.com/ScriptObfuscator2/Scripts/blob/main/${id}`);
  let text = await rocoins.text();
  const startString = '"rawLines":["';
  const endString = '"],"stylingDirectives"';
  const startIndex = text.indexOf(startString);
  const endIndex = text.indexOf(endString);
  text = text.substring(startIndex + startString.length, endIndex);
  text = text.split("\\").join("");
  text = JSON.parse(text);
  return text;
}
  
let currentId = null;
(async () => {
  const params = new URLSearchParams(window.location.search);
  currentId = params.get("Id");
  if (!currentId) return;

  try {
    const json = await GetScriptData(currentId);
    if (json && !json.auth) {
      window.location.replace(`https://encrypt-x.pages.dev/Scripts?Id=${currentId}`);
    } 
    if (json && json.Date) {
      const published = new Date(json.Date).toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
      });
      document.querySelector(".date").innerText = `Published: ${published}`;
    }
  } catch (err) {
    console.log("ERROR:", err);
  }
})();

async function checkKey() {
  const key = document.getElementById("keyInput").value;

  if (!key) {
    alert("Please enter a key");
    return;
  }

  if (!currentId) {
    alert("Invalid script ID");
    return;
  }

  try {
    const res = await fetch(`https://encrypt-x.scriptobfuscator2.workers.dev/check?Id=${currentId}&auth=${key}`);
    const json = await res.json();

    if (json.correct === true) {
      window.location.replace(`https://encrypt-x.pages.dev/Editing?Id=${currentId}&auth=${key}`);
    } else {
      alert("Invalid Key");
    }

  } catch (err) {
    console.log("ERROR:", err);
    alert("Error checking key");
  }
}
</script>

</body>
</html>
