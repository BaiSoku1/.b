<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encrypt X - Obfuscator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    min-height: 100vh;

    background:
      radial-gradient(circle at center, rgba(0,0,0,0.75) 0%, rgba(2,6,23,0.95) 100%),
      url("https://raw.githubusercontent.com/ScriptObfuscator2/Website/refs/heads/main/Dark%20Theme%20With%20Light%20Bulb.jpeg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    font-family: "Courier New", monospace;
    color: #e2e8f0;

    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .container {
    width: min(90%, 600px);
    background: rgba(15, 23, 42, 0.85);
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    text-align: center;
  }

  h1 {
    font-size: 18px;
    color: #ef4444;
    margin-bottom: 30px;
  }

  textarea {
    width: 90%;
    height: 200px;
    background: rgba(2,6,23,0.9);
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 12px;
    color: #e2e8f0;
    font-size: 13px;
    resize: none;
    outline: none;
  }

  button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: #ef4444;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #dc2626;
  }

  .footer {
    margin-top: 22px;
    font-size: 11px;
    color: #94a3b8;
  }
</style>
</head>

<body>

<div class="container">

  <h1>Encrypt X Obfuscator</h1>

  <textarea placeholder="Paste your script here..."></textarea>

  <button onclick="alert('Obfuscation feature not connected yet')">
    Obfuscate
  </button>

  <div class="footer">
    Secure script with Encrypt X Engine
  </div>

</div>

</body>
</html>
