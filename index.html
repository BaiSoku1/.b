<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOL · Obfuscator Core</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 40%, rgba(0, 0, 0, 0.7), rgba(2, 6, 23, 0.96)),
                url("https://raw.githubusercontent.com/ScriptObfuscator2/Website/refs/heads/main/Dark%20Theme%20With%20Light%20Bulb.jpeg");
    background-size: cover;
    background-position: center 20%;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Courier New', monospace;
    color: #f0f4fe;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1.5rem;
    backdrop-filter: blur(1.2px);
  }

  .container {
    width: min(92%, 680px);
    background: rgba(12, 18, 34, 0.72);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(71, 85, 105, 0.55);
    border-radius: 2rem;
    padding: 2rem 1.8rem;
    box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(255, 255, 255, 0.06) inset;
    transition: all 0.2s ease;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 650;
    letter-spacing: -0.2px;
    background: linear-gradient(130deg, #facc15, #ef4444);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 1rem;
    text-align: center;
  }

  textarea {
    width: 100%;
    height: 240px;
    background: rgba(2, 6, 23, 0.9);
    border: 1.5px solid #2d3a60;
    border-radius: 1.2rem;
    padding: 1rem;
    color: #eef3ff;
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 0.85rem;
    line-height: 1.45;
    resize: vertical;
    outline: none;
    transition: 0.2s;
    white-space: pre;
    overflow: auto;
  }

  textarea:focus {
    border-color: #ef4444;
    box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.25);
    background: #030712e6;
  }

  .switch-container {
    margin-top: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    font-size: 0.85rem;
    font-weight: 500;
    color: #cbd9ff;
    background: rgba(0, 0, 0, 0.3);
    padding: 0.5rem 1rem;
    border-radius: 2rem;
    width: fit-content;
  }

  .switch {
    position: relative;
    width: 44px;
    height: 22px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #334155;
    border-radius: 34px;
    transition: 0.25s ease;
  }

  .slider:before {
    content: "";
    position: absolute;
    height: 18px;
    width: 18px;
    left: 2px;
    bottom: 2px;
    background-color: white;
    border-radius: 50%;
    transition: 0.25s;
  }

  input:checked + .slider {
    background-color: #ef4444;
  }

  input:checked + .slider:before {
    transform: translateX(22px);
  }

  .key-input {
    margin-top: 0.8rem;
    width: 100%;
    transition: 0.2s;
  }

  .key-input input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: rgba(2, 6, 23, 0.9);
    border: 1.5px solid #2d3a60;
    border-radius: 2rem;
    color: #f0f4ff;
    font-size: 0.85rem;
    font-family: 'Inter', monospace;
    outline: none;
    letter-spacing: 0.3px;
  }

  .key-input input:focus {
    border-color: #ef4444;
    box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.3);
  }

  button {
    margin-top: 1.5rem;
    width: 100%;
    padding: 0.85rem 0;
    background: linear-gradient(100deg, #ef4444, #dc2626);
    border: none;
    border-radius: 3rem;
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 16px rgba(220, 38, 38, 0.35);
    letter-spacing: 0.4px;
  }

  button:hover {
    background: linear-gradient(100deg, #dc2626, #b91c1c);
    transform: scale(0.98);
    box-shadow: 0 3px 10px rgba(220, 38, 38, 0.5);
  }

  button:disabled {
    opacity: 0.6;
    transform: none;
    cursor: not-allowed;
  }

  .footer {
    margin-top: 1.4rem;
    font-size: 0.7rem;
    color: #8d9ac2;
    text-align: center;
    border-top: 1px dashed #2d3a5a;
    padding-top: 1rem;
  }

  .date {
    position: fixed;
    bottom: 12px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 0.7rem;
    color: #6f7da3;
    pointer-events: none;
    font-family: monospace;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(5px);
    padding: 5px 0;
    letter-spacing: 0.3px;
  }

  @media (max-width: 550px) {
    .container {
      padding: 1.5rem 1.2rem;
    }
    h1 {
      font-size: 1.5rem;
    }
    textarea {
      height: 200px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>⚡ LOL · OBFUSCATOR</h1>

  <textarea id="scriptBox" placeholder="▸ paste your raw script here ◂"></textarea>

  <div class="switch-container">
    <label class="switch">
      <input type="checkbox" id="keyToggle" onchange="toggleKeyBox()">
      <span class="slider"></span>
    </label>
    <span>🔐 require access key (protection)</span>
  </div>

  <div class="key-input" id="keyBox" style="display: none;">
    <input type="text" id="keyInput" maxlength="32" placeholder="✧ alphanumeric key (max 32) ✧" autocomplete="off">
  </div>

  <button onclick="obfuscate()">
    ✦ OBFUSCATE ✦
  </button>

  <div class="footer">
    LOL protection
  </div>
</div>

<div class="date">
  Published: March 27, 2026
</div>

<script>
function toggleKeyBox() {
  const toggle = document.getElementById("keyToggle");
  const box = document.getElementById("keyBox");
  box.style.display = toggle.checked ? "block" : "none";
  if (!toggle.checked) {
    document.getElementById("keyInput").value = "";
  }
}

async function obfuscate() {
  const scriptBox = document.getElementById("scriptBox");
  const keyInput = document.getElementById("keyInput");
  const button = document.querySelector("button");
  const toggle = document.getElementById("keyToggle");
  
  const scriptValue = scriptBox.value;
  const keyValue = keyInput.value;
  
  if (!scriptValue.trim()) {
    alert("❌ script is empty — paste your code first");
    return;
  }

  if (toggle.checked && !keyValue.trim()) {
    alert("❌ access key required — fill the key field");
    return;
  }

  if (!toggle.checked) {
    keyInput.value = "";
  }
  
  scriptBox.disabled = true;
  keyInput.disabled = true;
  button.disabled = true;
  toggle.disabled = true;
  
  try {
    const finalKey = toggle.checked ? keyValue : "";
    const res = await fetch(`https://encrypt-x.scriptobfuscator2.workers.dev/obfuscate?auth=${encodeURIComponent(finalKey)}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        script: scriptValue
      })
    });
    
    if (!res.ok) {
      throw new Error(`Server error: ${res.status}`);
    }
    
    const obfuscatedText = await res.text();
    scriptBox.value = obfuscatedText;
    keyInput.value = "";
    
  } catch (err) {
    alert("⚠️ obfuscation failed: " + err.message);
    console.error(err);
  } finally {
    scriptBox.disabled = false;
    keyInput.disabled = false;
    button.disabled = false;
    toggle.disabled = false;
  }
}

const keyField = document.getElementById("keyInput");
keyField.addEventListener("input", () => {
  keyField.value = keyField.value.replace(/[^a-zA-Z0-9]/g, "");
});
</script>

</body>
  </html>
