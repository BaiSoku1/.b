    }

    h1 { font-size: 24px; }
    p { font-size: 18px; }

    .banner-container { margin: 20px auto; display: block; }
  </style>
</head>
<body>

  <!-- POPUNDER AD -->
  <script src="https://pl28975915.profitablecpmratenetwork.com/4a/f2/9d/4af29d7621e4eb9c2f18f8cd5a41d1ef.js"></script>
  
  <!-- TOP BANNER -->
  <div class="banner-container">
    <script>
      atOptions = { 'key':'870154c105305777bf23bfe50a1e2d74','format':'iframe','height':60,'width':468,'params':{} };
    </script>
    <script src="https://www.highperformanceformat.com/870154c105305777bf23bfe50a1e2d74/invoke.js"></script>
  </div>

  <h1 id="step-title">🔑 Step 1 Verification</h1>
  <p id="text">Preparing verification...</p>

  <!-- Buttons -->
  <button id="btn1" disabled onclick="startStep(1)">Continue</button>
  <button id="btn2" onclick="startStep(2)">Continue</button>
  <button id="btn3" onclick="startStep(3)">Continue</button>
  <button id="btn4" onclick="startStep(4)">Get Link</button>

  <!-- BOTTOM BANNER -->
  <div class="banner-container">
    <script>
      atOptions = { 'key':'a9c6d2a0124e900f9bad9ac556aebf66','format':'iframe','height':250,'width':300,'params':{} };
    </script>
    <script src="https://www.highperformanceformat.com/a9c6d2a0124e900f9bad9ac556aebf66/invoke.js"></script>
  </div>

  <!-- SOCIAL BAR -->
  <script src="https://pl28986645.profitablecpmratenetwork.com/a4/55/76/a45576689b48bc731c80bae6c125366c.js"></script>

  <script>
    // Delay button → more impressions
    setTimeout(() => {
      document.getElementById("text").innerText = "Verification ready. Click continue to proceed.";
      document.getElementById("btn1").style.display = "inline-block";
    }, 6000);

    // Enabled button1
    setTimeout(() => {
      document.getElementById("btn1").disabled = false; // Enabled button1
    }, 9000);
    
    async function getFinalLink() {
      const link1 = "https://get-key.keysystem352.workers.dev/";
      const link2 = "https://get-key.keysystem2352.workers.dev/";
      const link3 = "https://get-key.keysystem3352.workers.dev/";
      
      const res = await fetch("https://api.codetabs.com/v1/proxy?quest=" + link1 + "status");
      const txt = await res.text();
      if (txt === "true") {
         return link1;
       }
      const res2 = await fetch("https://api.codetabs.com/v1/proxy?quest=" + link2 + "status");
      const txt2 = await res2.text();
      if (txt2 === "true") {
         return link2;
       }
       return link3;
    }
    
    let stepActive = 0;
    let leaveTime = 0;
    let viewTime = 0;
    
    async function startStep(stepNumber) {
      stepActive = stepNumber;
      leaveTime = 0;

      let link = '';

      if(stepNumber === 1) link = "https://www.profitablecpmratenetwork.com/s26aamdb?key=99dea3ce588aa9aa836785dd2cb32795";
      if(stepNumber === 2) link = "https://www.profitablecpmratenetwork.com/vcpfaz6mqh?key=1c1cb4fb07424cd21d64a1f69374af54";
      if(stepNumber === 3) link = "https://www.profitablecpmratenetwork.com/amqvjhv3u?key=ac1c90bbc1681cb480e95a84f170cbb8";

      if(stepNumber === 4) {
        const final = await getFinalLink();
        window.location.href = final + "make";
        return;
      }

      window.open(link, "_blank");
      document.getElementById(`btn${stepNumber}`).style.display = "none";

      document.getElementById("text").innerText = "Click continue and stay at least 10 seconds before returning!";    }

    window.addEventListener("blur", () => {
      if(stepActive > 0) leaveTime = Date.now();
    });

    window.addEventListener("focus", () => {
      if(stepActive === 0 || !leaveTime) return;

      const timeAway = (Date.now() - leaveTime)/1000;

      // 🔥 increased time (10 sec)
      if(timeAway + viewTime >= 10) {
        const nextStep = stepActive + 1;

        document.getElementById("step-title").innerText = `🔑 Step ${nextStep} Verification`;

        if(nextStep <= 4) {
          document.getElementById(`btn${nextStep}`).style.display = "inline-block";
        }

        stepActive = 0;
        leaveTime = 0;
        viewTime = 0;
        document.getElementById("text").innerText = "";
      } else {
        viewTime = (viewTime + timeAway);
        document.getElementById("text").innerText = `Click continue and stay at least ${Math.floor(10 - viewTime)} seconds before returning!`;
        document.getElementById(`btn${stepActive}`).style.display = "inline-block";
        stepActive = 0;
        leaveTime = 0;
      }
    });
  </script>

</body>
</html>
